services:
  - type: static_site
    name: frontend
    source: .
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @workspace/frontend run build
    publishDir: frontend/dist
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: backend
    source: .
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @workspace/backend run build
    startCommand: node backend/dist/index.mjs --enable-source-maps
    envVars:
      - key: NODE_ENV
        value: production
      # Add your environment variables here, e.g.:
      # - key: APPWRITE_ENDPOINT
      #   value: your_appwrite_endpoint
      # - key: DATABASE_URL
      #   value: your_database_url