kind = "web"
previewPath = "/"
title = "Race-X Creator Ecosystem"
version = "1.0.0"
id = "artifacts/race-x"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19784

[services.development]
run = "pnpm --filter @workspace/race-x run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/race-x", "run", "build" ]
publicDir = "artifacts/race-x/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19784"
BASE_PATH = "/"
